<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыка {% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-logo">
            <a class="navbar-brand" href="{% url 'music:home' %}">Hard Music</a>
        </div>
        <div class="nav-container">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:home' %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:album_list' %}">Альбомы</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:track_list' %}">Треки</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:musician_list' %}">Исполнители</a>
                </li>      
            </ul>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}" role="alert">
                    {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <div class="container text-center">
            <p class="text-muted">Музыкальный сайт для ценителей</p>
        </div>
    </footer>
</body>
</html>
