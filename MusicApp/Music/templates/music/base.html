<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыка {% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-logo">
            <a class="navbar-brand" href="{% url 'music:home' %}">Hard Music</a>
        </div>
        <div class="nav-container">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:home' %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:album_list' %}">Альбомы</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:track_list' %}">Треки</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'music:musician_list' %}">Исполнители</a>
                </li>      
            </ul>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}" role="alert">
                    {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <!-- <footer class="footer">
        <div class="container text-center">
            <p class="text-muted">Музыкальный сайт для ценителей</p>
        </div>
    </footer> -->


    <!-- ========================аудиоплеер========================= -->

    <div id="player" class="music-player" style="display: none;">
        <div class="player-inner">
            
            <div class="player-info">
                <img id="playerImg" src="" alt="">
                <div>
                    <div id="playerTitle"></div>
                    <div id="playerArtist"></div>
                </div>
            </div>
            <div class="player-controls">
                <button id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button id="playBtn"><i class="fas fa-play"></i></button>
                <button id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="player-progress">
                <input type="range" id="progressSlider" value="0" step="0.01">
            </div>
            <div class="player-timer">
                <span id="currentTime">0:00</span>
                <span>/</span>
                <span id="totalTime">0:00</span>
            </div>
            <button id="closePlayerBtn"><i class="fas fa-times"></i></button>
        </div>
        <audio id="playerAudio" src=""></audio>
    </div>

</body>



<script>

    // использует ли пользователь слайдер
    let activeSlider = false;
    

    // плеер для музыкального файла и окошко плеера
    const player = document.getElementById('player');
    const audio = document.getElementById('playerAudio');


    // кнопки управления
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    
    // считываем иконку для смены на паузу
    const playIcon = playBtn.querySelector('i');

    // данные для подстановки с трека
    const playerImg = document.getElementById('playerImg');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');

    // текущее время которое прибавляется с нуля
    const currentTimeSpan = document.getElementById('currentTime');
    // длительность трека
    const totalTimeSpan = document.getElementById('totalTime');
    const closeBtn = document.getElementById('closePlayerBtn');

    // перемотка трека
    const progressSlider = document.getElementById('progressSlider');

    let playlist = [];
    let currentTrackIndex = 0;


    function makePlaylist() {
    playlist = [];
    document.querySelectorAll('.play-this').forEach((btn, index) => {
        playlist.push({
            file: btn.dataset.file,
            title: btn.dataset.title,
            artist: btn.dataset.artist,
            cover: btn.dataset.cover,
            button: btn
        });
        btn.dataset.index = index;
    });
}


    function playTrackByIndex(index) {
    if (playlist.length === 0) return;
    
    if (index < 0) index = playlist.length - 1;
    if (index >= playlist.length) index = 0;
    
    currentTrackIndex = index;
    const track = playlist[currentTrackIndex];
    
    if (track) {
        audio.src = track.file;
        playerTitle.textContent = track.title;
        playerArtist.textContent = track.artist;
        playerImg.src = track.cover || '/static/blockPhoto.png';
        player.style.display = 'block';
        audio.play();
        playIcon.className = 'fas fa-pause';
    }
}

    // выбор следующего трека
    function nextTrack() {
        playTrackByIndex(currentTrackIndex + 1);
    }

    // выбор предыдущего трека
    function prevTrack() {
        playTrackByIndex(currentTrackIndex - 1);
    }


    function playTrack(file, title, artist, cover) {
        // обновляем плейлист
        makePlaylist(); 
        const trackIndex = playlist.findIndex(t => t.file === file);
    
    if (trackIndex !== -1) {
        playTrackByIndex(trackIndex);
    } else {
        // если трека нет в плейлисте
        audio.src = file;
        playerTitle.textContent = title;
        playerArtist.textContent = artist;
        playerImg.src = cover || '/static/blockPhoto.png';
        player.style.display = 'block';
        audio.play();
        playIcon.className = 'fas fa-pause';
    }
}



    playBtn.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
            playIcon.className = 'fas fa-pause';
        } else {
            audio.pause();
            playIcon.className = 'fas fa-play';
        }
    });

    // кнопки для перемещения по трекам
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    // автоматическое переключение на следующий трек когда закончился
    audio.addEventListener('ended', function() {
        nextTrack();
    });

    

    // если трек воспроизводится, перерисовываем время
    audio.addEventListener('timeupdate', function() {
        if (audio.duration && !activeSlider) {
            let current = Math.floor(audio.currentTime);
            let total = Math.floor(audio.duration);
            currentTimeSpan.textContent = Math.floor(current / 60) + ':' + (current % 60 < 10 ? '0' + current % 60 : current % 60);
            totalTimeSpan.textContent = Math.floor(total / 60) + ':' + (total % 60 < 10 ? '0' + total % 60 : total % 60);
            progressSlider.value = (audio.currentTime / audio.duration) * 100;
        }
    });

    progressSlider.addEventListener('mousedown', function() {
        activeSlider = true;
    });

    progressSlider.addEventListener('mouseup', function() {
        activeSlider = false;
        if (audio.duration) {
            audio.currentTime = (progressSlider.value / 100) * audio.duration;
        }
    });


    // изменение времени при движении слайдера
    progressSlider.addEventListener('input', function() {
        if (audio.duration) {
            let newTime = (this.value / 100) * audio.duration;
            let current = Math.floor(newTime);
            currentTimeSpan.textContent = Math.floor(current / 60) + ':' + (current % 60 < 10 ? '0' + current % 60 : current % 60);
        }
    });

    closeBtn.addEventListener('click', function() {
        player.style.display = 'none';
        audio.pause();
    });

    
    
    // обработччик нажатия кнопки воспроизведения трека
     document.querySelectorAll('.play-this').forEach(btn => {
        btn.addEventListener('click', function() {
            playTrack(
                this.dataset.file,
                this.dataset.title,
                this.dataset.artist,
                this.dataset.cover
            );
        });
    });


    
    window.playTrack = playTrack;

</script>



</html>
